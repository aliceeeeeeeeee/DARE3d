# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: regression
  - override /data/augmentation: monai_augmentation_reg
  - override /model: regression
  - override /callbacks: default
  - override /trainer: default
  - override /logger: regression_many_loggers

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["baseline", "unet"]
task_name: "regression3D"

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100

data:
  batch_size: 8

input_channels: [-1, 0, 1]
scale_file: ${paths.data_dir}/3d/scales.json
default_scale: [0.621, 0.621, 2]
target_scale: 1.0

renorm: "min-max"
order_dim_img: "zyx"
crop_size: 32
time_axis_padding: 1

representation_mode: "rotation_matrix_SVD"
vec_size: 9
angle_activation: "linear"

monitor_val: "val/loss"
monitor_direction: "min"
