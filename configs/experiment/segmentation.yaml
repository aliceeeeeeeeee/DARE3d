# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: segmentation
  - override /data/augmentation: monai_augmentation_best
  - override /model: segmentation
  - override /callbacks: default
  - override /trainer: default
  - override /logger: many_loggers

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["baseline", "unet"]
task_name: "segmentation3D"

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100

data:
  batch_size: 8

input_channels: [-1, 0, 1]
scale_file: ${paths.data_dir}/3d/scales.json
default_scale: [0.621, 0.621, 2]
target_scale: 1.0
steps_per_epoch: 1000

renorm: "min-max"
order_dim_img: "zyx"
crop_size: 128
type_mask: "center"
mask_geom: "sphere"
downsample_factors: [1]
cell_radius: 8
time_axis_padding: 1

monitor_val: "val/iou"
monitor_direction: "max"
