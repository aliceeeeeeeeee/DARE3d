random_elastic:
  _target_: dare3d.data.gpu_augmentations.MonaiAugmentationComponent
  transform:
    _target_: monai.transforms.Rand3DElasticd
    keys: ["image", "label", "weight"]
    mode: ["bilinear", "nearest", "nearest"]
    padding_mode: ["zeros", "zeros", "zeros"]

    prob: 0.5
    sigma_range: [5, 7]
    magnitude_range: [20, 100]
    rotate_range: null
    shear_range: null
    allow_missing_keys: True
    translate_range: null
    scale_range: null
    spatial_size: null
    device: "cuda:0"
