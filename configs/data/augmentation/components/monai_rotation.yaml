random_rotate:
  _target_: deletme3D.data.gpu_augmentations.MonaiAugmentationComponent
  transform:
    _target_: monai.transforms.RandRotated
    keys: ["image", "label", "weight"]
    mode: ["bilinear", "nearest", "nearest"]
    padding_mode: ["zeros", "zeros", "zeros"]
    allow_missing_keys: True
    range_x: 3.14
    range_y: 3.14
    range_z: 3.14
    prob: 0.5
    keep_size: True
