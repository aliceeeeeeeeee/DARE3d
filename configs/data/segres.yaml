_target_: dare3d.data.dare_datamodule.DareDataModule

defaults:
  - dataset@train_data: segres.yaml
  - dataset@val_data: segres.yaml
  - dataset@test_data: segres.yaml
  - augmentation: monai_augmentation_best.yaml

batch_size: 1
num_workers: 0
pin_memory: false

train_data:
  im_folder: ${paths.data_dir}/${train_dir}/im
  label_folder: ${paths.data_dir}/${train_dir}/label
  training: true
val_data:
  im_folder: ${paths.data_dir}/${val_dir}/im
  label_folder: ${paths.data_dir}/${val_dir}/label
test_data:
  im_folder: ${paths.data_dir}/${test_dir}/im
  label_folder: ${paths.data_dir}/${test_dir}/label
